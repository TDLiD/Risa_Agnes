<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>2026-02 Future Horizon</title>
    <script src="music/music_list.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/granim/2.0.0/granim.min.js"></script>
    <style>
        :root{--accent:#00ffa3;--glass:rgba(15,23,42,0.8);--glow:rgba(0,255,163,0.4);--heart-red:#ff4d6d;--purple:#a78bfa;--blue:#3b82f6}
        body{margin:0;background:#050507;color:white;font-family:'Inter',sans-serif;overflow:hidden;height:100dvh;position:fixed;width:100%}
        
        /* 고정 배경 이미지 설정 with enhancement */
        #fixed-bg{
            position: fixed;
            inset: 0;
            z-index: -3;
            background: url('images/2026-02/bg.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.5) contrast(1.1);
            animation: bgPulse 15s ease-in-out infinite;
        }
        @keyframes bgPulse{0%,100%{filter:brightness(0.5) contrast(1.1)}50%{filter:brightness(0.6) contrast(1.2)}}

        #canvas-bg{position:fixed;inset:0;z-index:-2; opacity: 0.5; mix-blend-mode: screen;}
        
        /* Floating particles effect */
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .particle{position:absolute;width:3px;height:3px;background:var(--accent);border-radius:50%;opacity:0.4;box-shadow:0 0 10px var(--accent);animation:float 20s infinite}
        @keyframes float{0%,100%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.4}90%{opacity:0.4}100%{transform:translateY(-100vh) translateX(100px);opacity:0}}
        
        /* Animated gradient orbs */
        .orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.3;pointer-events:none;z-index:-1;animation:orbFloat 20s ease-in-out infinite}
        .orb1{top:10%;left:10%;width:300px;height:300px;background:radial-gradient(circle,var(--accent),transparent);animation-delay:0s}
        .orb2{bottom:10%;right:10%;width:400px;height:400px;background:radial-gradient(circle,var(--purple),transparent);animation-delay:5s}
        .orb3{top:50%;left:50%;width:350px;height:350px;background:radial-gradient(circle,var(--blue),transparent);animation-delay:10s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-30px,30px) scale(0.9)}}
        
        /* 3D 갤러리 관련 스타일 - Enhanced */
        #main-scroller{position:absolute;inset:0;overflow:hidden;perspective:2500px;z-index:1}
        #sphere-scene{
            position:absolute;top:50%;left:50%;width:0;height:0;
            transform-style:preserve-3d;
            animation:rotateSphere 60s linear infinite;
            transition:all .8s;
            filter:drop-shadow(0 0 30px rgba(0,255,163,0.3));
        }
        @keyframes rotateSphere{from{transform:translate(-50%,-50%) rotateX(-5deg) rotateY(0deg)}to{transform:translate(-50%,-50%) rotateX(-5deg) rotateY(360deg)}}
        
        /* 카드 크기 반응형 수정 with 3D enhancements */
        .photo-card{
            position:absolute;
            width:140px; height:180px;
            left:-70px; top:-90px;
            border-radius:16px;
            border:1px solid rgba(255,255,255,0.2);
            background:var(--glass);
            overflow:hidden;
            cursor:pointer;
            transition:all .5s cubic-bezier(0.23, 1, 0.32, 1);
            filter:brightness(.8) saturate(0.8);
            backface-visibility:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,163,0.1) inset;
            transform-style:preserve-3d;
        }

        @media (max-width: 768px) {
            .photo-card {
                width: 100px; height: 130px;
                left: -50px; top: -65px;
            }
        }

        /* 3D glow ring effect */
        .photo-card::before{
            content:'';
            position:absolute;
            inset:-5px;
            border-radius:20px;
            background:linear-gradient(45deg, var(--accent), var(--purple), var(--blue), var(--accent));
            background-size:300% 300%;
            opacity:0;
            transition:opacity 0.5s;
            animation:gradientShift 8s ease infinite;
            z-index:-1;
        }
        @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        
        .photo-card:hover{
            filter:brightness(1.2) saturate(1.2);
            border-color:var(--accent);
            box-shadow:0 20px 60px rgba(0,255,163,0.6), 0 0 40px rgba(0,255,163,0.4), 0 0 0 1px rgba(0,255,163,0.3) inset;
            transform:translateZ(50px) scale(1.1);
        }
        .photo-card:hover::before{opacity:0.6}
        .photo-card img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;border-radius:16px}
        .photo-card:hover img{transform:scale(1.05)}

        /* 네비게이션 & UI - Enhanced */
        .nav{position:fixed;top:max(20px, env(safe-area-inset-top));left:20px;z-index:2000000}
        .btn{
            padding:10px 20px;
            border:1px solid var(--accent);
            color:var(--accent);
            text-decoration:none;
            background:rgba(0,0,0,0.7);
            backdrop-filter:blur(20px);
            border-radius:30px;
            font-weight:bold;
            font-size:11px;
            box-shadow:0 5px 20px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,163,0.2);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .btn::before{
            content:'';
            position:absolute;
            top:50%;
            left:50%;
            width:0;
            height:0;
            background:radial-gradient(circle,rgba(0,255,163,0.3),transparent);
            border-radius:50%;
            transition:0.5s;
            transform:translate(-50%,-50%);
        }
        .btn:hover{
            background:rgba(0,255,163,0.1);
            transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,163,0.4);
        }
        .btn:hover::before{width:300px;height:300px}
        
        .bottom-nav{position:fixed;bottom:max(20px,env(safe-area-inset-bottom));left:20px;z-index:9999}
        #ai-rank-btn{
            padding:0 25px; 
            height:50px;
            background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(15,23,42,.9));
            border:1px solid var(--accent);
            color:var(--accent);
            border-radius:25px;
            cursor:pointer;
            font-weight:bold;
            font-size:11px;
            backdrop-filter:blur(20px);
            box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--glow);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
            text-shadow:0 0 10px rgba(0,255,163,0.5);
        }
        #ai-rank-btn::before{
            content:'';
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:conic-gradient(from 0deg,transparent,rgba(0,255,163,0.3),transparent);
            animation:rotate 4s linear infinite;
            opacity:0;
        }
        @keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        #ai-rank-btn:hover{
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 15px 40px rgba(0,0,0,0.7), 0 0 40px var(--glow);
            background:linear-gradient(135deg,rgba(0,255,163,0.15),rgba(15,23,42,.9));
        }
        #ai-rank-btn:hover::before{opacity:1}

        /* 뮤직 플레이어 반응형 수정 - Enhanced 3D */
        #p-cont{
            position:fixed; 
            bottom:max(20px, env(safe-area-inset-bottom)); 
            right:20px;
            width:260px;
            background:linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9));
            backdrop-filter:blur(30px) saturate(180%);
            border:1px solid rgba(0,255,163,0.3);
            border-radius:24px;
            z-index:1000000;
            padding:18px;
            box-shadow:0 25px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,163,0.1) inset, 0 10px 40px rgba(0,255,163,0.3);
            touch-action:none;
            transform:translateZ(0);
            transition:transform 0.3s, box-shadow 0.3s;
        }
        #p-cont::before{
            content:'';
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:conic-gradient(from 0deg,transparent,rgba(0,255,163,0.2),transparent);
            animation:rotate 8s linear infinite;
            pointer-events:none;
            opacity:0.3;
            border-radius:24px;
        }
        #p-cont:hover{
            transform:translateY(-5px) translateZ(20px);
            box-shadow:0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(0,255,163,0.2) inset, 0 15px 60px rgba(0,255,163,0.5);
        }

        @media (max-width: 480px) {
            #p-cont {
                width: calc(100% - 40px);
                left: 20px; right: 20px;
                padding: 15px;
            }
            .ctrls button { height: 36px; font-size: 10px; }
        }

        .p-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;pointer-events:none;position:relative;z-index:1}
        .eq{display:flex;align-items:flex-end;gap:2px;height:14px;padding:4px;background:rgba(0,255,163,0.1);border-radius:8px}
        .eq span{
            width:3px;
            background:linear-gradient(to top,var(--accent),var(--purple));
            animation:eq .8s ease-in-out infinite alternate;
            border-radius:2px;
            box-shadow:0 0 8px var(--accent);
        }
        .eq span:nth-child(2){animation-delay:.1s}
        .eq span:nth-child(3){animation-delay:.2s}
        .eq span:nth-child(4){animation-delay:.3s}
        @keyframes eq{0%{height:3px}100%{height:14px}}
        .paused .eq span{animation-play-state:paused;height:3px}
        
        .np-c{flex:1;overflow:hidden}
        #t-name{
            font-size:11px;
            font-weight:700;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            color:var(--accent);
            text-shadow:0 0 10px rgba(0,255,163,0.5);
        }
        
        .ctrls{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0;position:relative;z-index:1}
        .ctrls button{
            background:linear-gradient(135deg,rgba(0,255,163,0.15),rgba(59,130,246,0.15));
            border:1px solid rgba(255,255,255,0.15);
            color:white;
            cursor:pointer;
            border-radius:12px;
            height:36px;
            font-size:11px;
            font-weight:600;
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.3);
        }
        .ctrls button::before{
            content:'';
            position:absolute;
            top:50%;
            left:50%;
            width:0;
            height:0;
            background:radial-gradient(circle,rgba(0,255,163,0.4),transparent);
            border-radius:50%;
            transition:0.5s;
            transform:translate(-50%,-50%);
        }
        .ctrls button:hover{
            background:linear-gradient(135deg,rgba(0,255,163,0.3),rgba(59,130,246,0.3));
            border-color:var(--accent);
            transform:translateY(-2px);
            box-shadow:0 8px 25px rgba(0,255,163,0.4);
        }
        .ctrls button:hover::before{width:200px;height:200px}
        .ctrls button:active{transform:translateY(0)}
        
        .s-list{
            max-height:60px;
            overflow-y:auto;
            font-size:9px;
            background:rgba(0,0,0,0.4);
            border-radius:12px;
            padding:6px;
            position:relative;
            z-index:1;
            border:1px solid rgba(255,255,255,0.05);
        }
        .s-list::-webkit-scrollbar{width:4px}
        .s-list::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);border-radius:4px}
        .s-list::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--accent),var(--purple));border-radius:4px;box-shadow:0 0 10px var(--accent)}
        
        .s-item{
            padding:6px 8px;
            cursor:pointer;
            border-radius:8px;
            opacity:.6;
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .s-item::before{
            content:'';
            position:absolute;
            left:0;
            top:50%;
            width:3px;
            height:0;
            background:linear-gradient(to bottom,var(--accent),var(--purple));
            transition:0.3s;
            transform:translateY(-50%);
            border-radius:2px;
        }
        .s-item:hover{
            opacity:.9;
            background:rgba(255,255,255,.05);
            padding-left:12px;
        }
        .s-item:hover::before{height:60%;box-shadow:0 0 8px var(--accent)}
        .s-item.active{
            opacity:1;
            background:linear-gradient(90deg,rgba(0,255,163,.25),rgba(0,255,163,.1));
            color:var(--accent);
            font-weight:700;
            box-shadow:0 0 20px rgba(0,255,163,0.3);
            padding-left:12px;
        }
        .s-item.active::before{height:80%;box-shadow:0 0 12px var(--accent)}

        /* 스캔 오버레이 & 모달 - Enhanced */
        #proc-ov{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.95);
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            z-index:2000000;
            backdrop-filter:blur(20px);
        }
        #proc-ov > div:first-child{
            color:var(--accent);
            letter-spacing:3px;
            font-size:14px;
            font-weight:700;
            text-shadow:0 0 20px var(--accent);
            animation:pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        
        .loader{
            width:220px;
            height:4px;
            background:rgba(255,255,255,.1);
            margin-top:25px;
            border-radius:4px;
            position:relative;
            overflow:hidden;
            box-shadow:0 0 20px rgba(0,0,0,0.5) inset;
        }
        .l-bar{
            width:0%;
            height:100%;
            background:linear-gradient(90deg,var(--accent),var(--purple),var(--blue));
            background-size:200% 100%;
            position:absolute;
            transition:width .2s;
            border-radius:4px;
            box-shadow:0 0 20px var(--accent);
            animation:shimmer 2s linear infinite;
        }
        @keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
        
        #modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.95);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:3000000;
            backdrop-filter:blur(20px);
        }
        #modal img{
            max-width:90%;
            max-height:85%;
            border-radius:12px;
            box-shadow:0 0 60px var(--glow), 0 20px 80px rgba(0,0,0,0.8);
            object-fit:contain;
            border:1px solid rgba(0,255,163,0.3);
            animation:modalFadeIn 0.5s ease-out;
        }
        @keyframes modalFadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        
        /* Loading animation */
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .nav{animation:fadeIn 0.8s ease-out}
        .bottom-nav{animation:fadeIn 1s ease-out 0.2s both}
        #p-cont{animation:fadeIn 1.2s ease-out 0.4s both}
    </style>
</head>
<body>
    <!-- Animated orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <div id="fixed-bg"></div>
    <canvas id="canvas-bg"></canvas>

    <nav class="nav"><a href="index.html" class="btn">← EXIT</a></nav>
    
    <div id="main-scroller">
        <div id="sphere-scene"></div>
    </div>

    <div class="bottom-nav">
        <button id="ai-rank-btn">SCAN BEST PHOTO</button>
    </div>

    <div id="p-cont" class="paused">
        <div class="p-header">
            <div class="eq"><span></span><span></span><span></span><span></span></div>
            <div class="np-c"><div style="font-size:7px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;">Now Playing</div><div id="t-name">READY</div></div>
        </div>
        <div class="ctrls">
            <button onclick="prevT()">◁◁</button>
            <button id="p-btn" onclick="toggleP()">PLAY</button>
            <button onclick="stopT()">■</button>
            <button onclick="nextT()">▷▷</button>
        </div>
        <div class="s-list" id="pl"></div>
        <audio id="audio" playsinline></audio>
    </div>

    <div id="proc-ov">
        <div>AI SCANNING...</div>
        <div class="loader"><div class="l-bar" id="p-bar"></div></div>
    </div>

    <div id="modal" onclick="closeM()"><img id="m-img" src=""></div>

    <script>
        const audio=document.getElementById('audio'), pBtn=document.getElementById('p-btn'), tName=document.getElementById('t-name'), plEl=document.getElementById('pl'), pCont=document.getElementById('p-cont'), tracks=typeof EXTERNAL_TRACKS!=='undefined'?EXTERNAL_TRACKS:[];
        const scene=document.getElementById('sphere-scene'), modal=document.getElementById('modal'), mImg=document.getElementById('m-img');
        let cIdx=0, cards=[];

        // Create floating particles
        function createParticles(){
            const container=document.getElementById('particles');
            for(let i=0;i<40;i++){
                const particle=document.createElement('div');
                particle.className='particle';
                particle.style.left=Math.random()*100+'%';
                particle.style.top=Math.random()*100+'%';
                particle.style.animationDelay=Math.random()*20+'s';
                particle.style.animationDuration=(15+Math.random()*10)+'s';
                container.appendChild(particle);
            }
        }

        new Granim({element:'#canvas-bg',direction:'top-bottom',states:{"default-state":{gradients:[['#050507','#1a0f2e'],['#0f172a','#050507']],transitionSpeed:8000}}});

        async function loadG(){
            try{
                const res=await fetch('images/photos.json'), data=await res.json(), photos=data["2026_02"]||[];
                const count=photos.length;
                const radius=window.innerWidth<768?220:450;
                
                photos.forEach((f,i)=>{
                    const img=document.createElement('div');
                    img.className='photo-card';
                    
                    const phi = Math.acos(-1 + (2 * i) / count);
                    const theta = Math.sqrt(count * Math.PI) * phi;
                    const x = radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.sin(phi) * Math.sin(theta);
                    const z = radius * Math.cos(phi);
                    
                    img.style.transform = `translate3d(${x}px,${y}px,${z}px) rotateY(${theta}rad) rotateX(${phi-Math.PI/2}rad)`;
                    img.innerHTML = `<img src="images/2026-02/${f}" loading="lazy">`;
                    
                    img.onclick=(e)=>{
                        e.stopPropagation();
                        openM(`images/2026-02/${f}`);
                        if(audio.paused) toggleP();
                    };
                    
                    scene.appendChild(img);
                    cards.push(img);
                });
            }catch(e){console.error(e)}
        }

        document.getElementById('ai-rank-btn').onclick=()=>{
            const ov=document.getElementById('proc-ov'), bar=document.getElementById('p-bar');
            ov.style.display='flex'; bar.style.width='0%';
            setTimeout(()=>bar.style.width='100%', 100);
            setTimeout(()=>{
                ov.style.display='none';
                const randomCard = cards[Math.floor(Math.random()*cards.length)];
                openM(randomCard.querySelector('img').src);
            }, 1500);
        };

        function openM(s){mImg.src=s; modal.style.display='flex'}
        function closeM(){modal.style.display='none'}

        function initP(){
            if(!tracks.length)return;
            plEl.innerHTML=tracks.map((t,i)=>`<div class="s-item ${i===cIdx?'active':''}" onclick="loadT(${i})">${String(i+1).padStart(2,'0')} ${t.replace('.mp3','').replace(/_/g,' ')}</div>`).join('');
            loadT(cIdx,false);
        }
        function loadT(idx,a=true){
            cIdx=idx; audio.src=`music/${tracks[idx]}`; tName.innerText=tracks[idx].replace('.mp3','').replace(/_/g,' ');
            document.querySelectorAll('.s-item').forEach((it,i)=>it.classList.toggle('active',i===idx));
            if(a)audio.play().then(()=>updUI(true)).catch(e=>{}); else updUI(false);
        }
        function toggleP(){if(audio.paused)audio.play().then(()=>updUI(true)).catch(e=>{});else{audio.pause();updUI(false)}}
        function updUI(p){pCont.classList.toggle('paused',!p);pBtn.innerText=p?"PAUSE":"PLAY"}
        function nextT(){cIdx=(cIdx+1)%tracks.length;loadT(cIdx)}
        function prevT(){cIdx=(cIdx-1+tracks.length)%tracks.length;loadT(cIdx)}
        function stopT(){audio.pause();audio.currentTime=0;updUI(false)}
        audio.onended=nextT;

        // 터치 드래그 지원
        let isDrag=false,sX,sY,iX,iY;
        const dragStart=(e)=>{
            if(e.target.closest('button')||e.target.closest('.s-list'))return;
            isDrag=true; const c=e.type.includes('touch')?e.touches[0]:e;
            const r=pCont.getBoundingClientRect(); sX=c.clientX; sY=c.clientY; iX=r.left; iY=r.top;
        };
        const dragMove=(e)=>{
            if(!isDrag)return; const c=e.type.includes('touch')?e.touches[0]:e;
            pCont.style.left=`${iX+(c.clientX-sX)}px`; pCont.style.top=`${iY+(c.clientY-sY)}px`;
            pCont.style.right='auto'; pCont.style.bottom='auto';
        };
        pCont.addEventListener('mousedown',dragStart); pCont.addEventListener('touchstart',dragStart);
        window.addEventListener('mousemove',dragMove); window.addEventListener('touchmove',dragMove, {passive:false});
        window.addEventListener('mouseup',()=>isDrag=false); window.addEventListener('touchend',()=>isDrag=false);

        window.onload=()=>{createParticles();loadG();initP()};
    </script>
</body>
</html>
