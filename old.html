<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <title>2026 Future Gallery</title>
    <script src="music/music_list.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/granim/2.0.0/granim.min.js"></script>
    <style>
        :root{--accent:#00ffa3;--glow:rgba(0,255,163,0.4);--heart-red:#ff4d6d;--glass-bg:rgba(15,23,42,0.7);--purple:#a78bfa;--blue:#3b82f6}
        html,body{margin:0;padding:0;width:100%;height:100dvh;background:#050507;overflow:hidden;position:fixed;color:white;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
        
        /* Enhanced background with animation */
        #fixed-bg-img{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:100%;
            height:100%;
            object-fit:contain;
            background-color:#050507;
            z-index:-1;
            opacity:.5;
            pointer-events:none;
            filter:brightness(0.8) contrast(1.1);
            animation:bgBreath 20s ease-in-out infinite;
        }
        @keyframes bgBreath{0%,100%{opacity:.5;filter:brightness(0.8) contrast(1.1)}50%{opacity:.6;filter:brightness(0.9) contrast(1.15)}}
        @media(max-width:768px){#fixed-bg-img{width:auto;height:100%}}
        
        /* Animated gradient orbs */
        .orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.25;pointer-events:none;z-index:-1;animation:orbFloat 25s ease-in-out infinite}
        .orb1{top:20%;left:15%;width:350px;height:350px;background:radial-gradient(circle,var(--heart-red),transparent);animation-delay:0s}
        .orb2{bottom:20%;right:15%;width:400px;height:400px;background:radial-gradient(circle,var(--purple),transparent);animation-delay:8s}
        .orb3{top:60%;left:60%;width:300px;height:300px;background:radial-gradient(circle,var(--accent),transparent);animation-delay:16s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-40px) scale(1.15)}66%{transform:translate(-40px,40px) scale(0.85)}}
        
        /* Floating particles effect */
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .particle{position:absolute;width:3px;height:3px;background:var(--heart-red);border-radius:50%;opacity:0.3;box-shadow:0 0 10px var(--heart-red);animation:float 25s infinite}
        @keyframes float{0%,100%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.3}90%{opacity:0.3}100%{transform:translateY(-100vh) translateX(80px);opacity:0}}
        
        #main-scroller{position:absolute;inset:0;overflow:hidden;perspective:2500px;z-index:1}
        body.grid-mode #main-scroller{overflow-y:auto}
        #canvas-bg{position:fixed;inset:0;z-index:-2;pointer-events:none;opacity:0.4}
        
        /* Enhanced 3D sphere scene */
        #sphere-scene{
            position:absolute;
            top:50%;
            left:50%;
            width:0;
            height:0;
            transform-style:preserve-3d;
            animation:rotateEarth 30s linear infinite;
            transition:all .8s;
            filter:drop-shadow(0 0 40px rgba(255,77,109,0.3));
        }
        body.grid-mode #sphere-scene{
            animation:none!important;
            transform:none!important;
            position:relative!important;
            top:0!important;
            left:0!important;
            width:100%!important;
            height:auto!important;
            display:grid!important;
            grid-template-columns:repeat(auto-fill,minmax(140px,1fr))!important;
            gap:15px!important;
            padding:80px 20px 180px 20px!important;
            box-sizing:border-box!important;
            filter:none!important;
        }
        @keyframes rotateEarth{from{transform:translate(-50%,-50%) rotateX(-5deg) rotateY(0deg)}to{transform:translate(-50%,-50%) rotateX(-5deg) rotateY(360deg)}}
        
        /* Enhanced 3D photo cards */
        .photo-card{
            position:absolute;
            width:150px;
            height:150px;
            left:-75px;
            top:-75px;
            object-fit:cover;
            border-radius:16px;
            border:1px solid rgba(255,255,255,0.2);
            cursor:pointer;
            transition:all .6s cubic-bezier(0.23, 1, 0.32, 1);
            filter:brightness(.7) saturate(0.8);
            backface-visibility:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,77,109,0.1) inset;
            transform-style:preserve-3d;
        }
        
        /* 3D glow effect */
        .photo-card::before{
            content:'';
            position:absolute;
            inset:-5px;
            border-radius:20px;
            background:linear-gradient(45deg, var(--heart-red), var(--purple), var(--accent), var(--heart-red));
            background-size:300% 300%;
            opacity:0;
            transition:opacity 0.5s;
            animation:gradientRotate 10s ease infinite;
            z-index:-1;
        }
        @keyframes gradientRotate{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        
        .photo-card:hover{
            filter:brightness(1.1) saturate(1.2);
            border-color:var(--heart-red);
            box-shadow:0 20px 60px rgba(255,77,109,0.6), 0 0 40px rgba(255,77,109,0.4), 0 0 0 1px rgba(255,77,109,0.3) inset;
            transform:translateZ(60px) scale(1.15);
        }
        .photo-card:hover::before{opacity:0.7}
        
        body.grid-mode .photo-card{
            position:relative!important;
            left:0!important;
            top:0!important;
            width:100%!important;
            height:auto!important;
            aspect-ratio:1/1;
            transform:none!important;
            filter:brightness(1);
            box-shadow:0 5px 20px rgba(0,0,0,0.4);
        }
        body.grid-mode .photo-card:hover{
            transform:translateY(-5px) scale(1.02)!important;
            box-shadow:0 15px 40px rgba(255,77,109,0.5);
        }
        
        /* Enhanced bottom navigation */
        .bottom-nav{
            position:fixed!important;
            bottom:max(30px,env(safe-area-inset-bottom))!important;
            left:30px!important;
            z-index:999999!important;
            display:flex!important;
            align-items:center;
            gap:15px;
            pointer-events:auto!important;
            width:max-content;
        }
        
        #heart-btn{
            width:60px;
            height:60px;
            background:linear-gradient(135deg,var(--heart-red),#c92a49);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            border:none;
            box-shadow:0 10px 30px rgba(255,77,109,.6), 0 0 20px rgba(255,77,109,0.4);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        #heart-btn::before{
            content:'';
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:conic-gradient(from 0deg,transparent,rgba(255,255,255,0.3),transparent);
            animation:rotate 3s linear infinite;
            opacity:0;
        }
        @keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        #heart-btn:hover{
            transform:scale(1.1) translateY(-3px);
            box-shadow:0 15px 40px rgba(255,77,109,.8), 0 0 30px rgba(255,77,109,0.6);
        }
        #heart-btn:hover::before{opacity:1}
        #heart-btn svg{position:relative;z-index:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
        
        #ai-rank-btn{
            padding:0 28px;
            height:54px;
            background:linear-gradient(135deg,rgba(0,0,0,.9),rgba(15,23,42,.9));
            border:1px solid var(--accent);
            color:var(--accent);
            border-radius:27px;
            cursor:pointer;
            font-weight:bold;
            backdrop-filter:blur(20px);
            white-space:nowrap;
            font-size:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--glow);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
            text-shadow:0 0 10px rgba(0,255,163,0.5);
        }
        #ai-rank-btn::before{
            content:'';
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:conic-gradient(from 0deg,transparent,rgba(0,255,163,0.3),transparent);
            animation:rotate 4s linear infinite;
            opacity:0;
        }
        #ai-rank-btn:hover{
            transform:translateY(-3px) scale(1.02);
            box-shadow:0 15px 40px rgba(0,0,0,0.7), 0 0 40px var(--glow);
            background:linear-gradient(135deg,rgba(0,255,163,0.15),rgba(15,23,42,.9));
        }
        #ai-rank-btn:hover::before{opacity:1}
        
        /* Enhanced music player */
        #p-cont{
            position:fixed;
            bottom:30px;
            right:30px;
            width:280px;
            background:linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9));
            backdrop-filter:blur(30px) saturate(180%);
            border:1px solid rgba(0,255,163,.3);
            border-radius:28px;
            z-index:1000000;
            padding:20px;
            box-shadow:0 25px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,255,163,0.1) inset, 0 10px 40px rgba(0,255,163,0.3);
            touch-action:none;
            cursor:grab;
            transform:translateZ(0);
            transition:transform 0.3s, box-shadow 0.3s;
        }
        #p-cont::before{
            content:'';
            position:absolute;
            top:-50%;
            left:-50%;
            width:200%;
            height:200%;
            background:conic-gradient(from 0deg,transparent,rgba(0,255,163,0.2),transparent);
            animation:rotate 8s linear infinite;
            pointer-events:none;
            opacity:0.3;
            border-radius:28px;
        }
        #p-cont:hover{
            transform:translateY(-5px) translateZ(20px);
            box-shadow:0 30px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(0,255,163,0.2) inset, 0 15px 60px rgba(0,255,163,0.5);
        }
        #p-cont:active{cursor:grabbing}
        
        .p-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;pointer-events:none;position:relative;z-index:1}
        .eq{display:flex;align-items:flex-end;gap:2px;height:16px;padding:5px;background:rgba(0,255,163,0.1);border-radius:10px}
        .eq span{
            width:3px;
            background:linear-gradient(to top,var(--accent),var(--purple));
            animation:eq .8s ease-in-out infinite alternate;
            border-radius:2px;
            box-shadow:0 0 10px var(--accent);
        }
        @keyframes eq{0%{height:4px}100%{height:16px}}
        .paused .eq span{animation-play-state:paused;height:4px}
        
        .np-c{flex:1;overflow:hidden}
        .np-l{font-size:8px;text-transform:uppercase;color:var(--accent);letter-spacing:1px;margin-bottom:2px}
        #t-name{
            font-size:12px;
            font-weight:700;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            color:var(--accent);
            text-shadow:0 0 10px rgba(0,255,163,0.5);
        }
        
        .ctrls{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0;position:relative;z-index:1}
        .ctrls button{
            background:linear-gradient(135deg,rgba(0,255,163,0.15),rgba(59,130,246,0.15));
            border:1px solid rgba(255,255,255,.15);
            color:white;
            cursor:pointer;
            height:40px;
            border-radius:12px;
            font-size:11px;
            font-weight:600;
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.3);
        }
        .ctrls button::before{
            content:'';
            position:absolute;
            top:50%;
            left:50%;
            width:0;
            height:0;
            background:radial-gradient(circle,rgba(0,255,163,0.4),transparent);
            border-radius:50%;
            transition:0.5s;
            transform:translate(-50%,-50%);
        }
        .ctrls button:hover{
            background:linear-gradient(135deg,rgba(0,255,163,0.3),rgba(59,130,246,0.3));
            border-color:var(--accent);
            transform:translateY(-2px);
            box-shadow:0 8px 25px rgba(0,255,163,0.4);
        }
        .ctrls button:hover::before{width:200px;height:200px}
        .ctrls button:active{transform:translateY(0)}
        
        .s-list{
            max-height:80px;
            overflow-y:auto;
            font-size:10px;
            background:rgba(0,0,0,.4);
            border-radius:12px;
            padding:6px;
            position:relative;
            z-index:1;
            border:1px solid rgba(255,255,255,0.05);
        }
        .s-list::-webkit-scrollbar{width:4px}
        .s-list::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);border-radius:4px}
        .s-list::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--accent),var(--purple));border-radius:4px;box-shadow:0 0 10px var(--accent)}
        
        .s-item{
            padding:8px 10px;
            cursor:pointer;
            border-radius:8px;
            display:flex;
            align-items:center;
            opacity:.6;
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .s-item::before{
            content:'';
            position:absolute;
            left:0;
            top:50%;
            width:3px;
            height:0;
            background:linear-gradient(to bottom,var(--accent),var(--purple));
            transition:0.3s;
            transform:translateY(-50%);
            border-radius:2px;
        }
        .s-item:hover{
            opacity:.9;
            background:rgba(255,255,255,.05);
            padding-left:14px;
        }
        .s-item:hover::before{height:60%;box-shadow:0 0 10px var(--accent)}
        .s-item.active{
            opacity:1;
            background:linear-gradient(90deg,rgba(0,255,163,.25),rgba(0,255,163,.1));
            color:var(--accent);
            font-weight:700;
            box-shadow:0 0 20px rgba(0,255,163,0.3);
            padding-left:14px;
        }
        .s-item.active::before{height:80%;box-shadow:0 0 12px var(--accent)}
        
        /* Enhanced navigation */
        .nav{position:fixed;top:20px;left:20px;z-index:1000000}
        .btn{
            padding:12px 22px;
            border:1px solid var(--accent);
            color:var(--accent);
            text-decoration:none;
            background:rgba(0,0,0,.7);
            backdrop-filter:blur(20px);
            border-radius:30px;
            font-weight:bold;
            font-size:11px;
            box-shadow:0 5px 20px rgba(0,0,0,0.5), 0 0 20px rgba(0,255,163,0.2);
            transition:all 0.3s;
            position:relative;
            overflow:hidden;
        }
        .btn::before{
            content:'';
            position:absolute;
            top:50%;
            left:50%;
            width:0;
            height:0;
            background:radial-gradient(circle,rgba(0,255,163,0.3),transparent);
            border-radius:50%;
            transition:0.5s;
            transform:translate(-50%,-50%);
        }
        .btn:hover{
            background:rgba(0,255,163,0.1);
            transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(0,0,0,0.6), 0 0 30px rgba(0,255,163,0.4);
        }
        .btn:hover::before{width:300px;height:300px}
        
        /* Enhanced scanning overlay */
        #proc-ov{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.95);
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            z-index:2000000;
            backdrop-filter:blur(20px);
        }
        #proc-ov > div:first-child{
            color:var(--accent);
            letter-spacing:3px;
            font-size:14px;
            font-weight:700;
            text-shadow:0 0 20px var(--accent);
            animation:pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        
        .loader{
            width:240px;
            height:5px;
            background:rgba(255,255,255,.1);
            margin-top:30px;
            border-radius:4px;
            position:relative;
            overflow:hidden;
            box-shadow:0 0 20px rgba(0,0,0,0.5) inset;
        }
        .l-bar{
            width:0%;
            height:100%;
            background:linear-gradient(90deg,var(--accent),var(--purple),var(--heart-red));
            background-size:200% 100%;
            position:absolute;
            transition:width .2s;
            border-radius:4px;
            box-shadow:0 0 20px var(--accent);
            animation:shimmer 2s linear infinite;
        }
        @keyframes shimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
        
        /* Enhanced modal */
        #modal{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.95);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:3000000;
            backdrop-filter:blur(20px);
        }
        #modal img{
            max-width:90%;
            max-height:80%;
            border-radius:12px;
            box-shadow:0 0 60px var(--glow), 0 20px 80px rgba(0,0,0,0.8);
            border:1px solid rgba(0,255,163,0.3);
            animation:modalFadeIn 0.5s ease-out;
        }
        @keyframes modalFadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        
        /* Loading animations */
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .nav{animation:fadeIn 0.8s ease-out}
        .bottom-nav{animation:fadeIn 1s ease-out 0.2s both}
        #p-cont{animation:fadeIn 1.2s ease-out 0.4s both}
    </style>
</head>
<body>
    <!-- Animated orbs -->
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <audio id="audio"></audio>
    <canvas id="canvas-bg"></canvas>
    <img src="images/old/image-045.png" id="fixed-bg-img">
    <nav class="nav"><a href="index.html" class="btn">← EXIT</a></nav>
    <div id="main-scroller"><div id="sphere-scene"></div></div>
    <div id="p-cont" class="paused">
        <div class="p-header">
            <div class="eq"><span style="animation-delay:.1s"></span><span style="animation-delay:.3s"></span><span style="animation-delay:.2s"></span><span style="animation-delay:.4s"></span></div>
            <div class="np-c"><div class="np-l">Now Playing</div><div id="t-name">READY</div></div>
        </div>
        <div class="ctrls"><button onclick="prevT()">◁◁</button><button id="p-btn" onclick="toggleP()">PLAY</button><button onclick="stopT()">■</button><button onclick="nextT()">▷▷</button></div>
        <div class="s-list" id="pl"></div>
    </div>
    <div class="bottom-nav">
        <button id="heart-btn"><svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
        <button id="ai-rank-btn">WHICH ONE IS THE PRETTIEST?</button>
    </div>
    <div id="proc-ov"><div>SCANNING...</div><div class="loader"><div class="l-bar" id="p-bar"></div></div></div>
    <div id="modal" onclick="closeM()"><img id="m-img" style="max-width:90%;max-height:80%;border-radius:8px;box-shadow:0 0 30px var(--glow)"></div>
    <script>
        const audio=document.getElementById('audio'),pBtn=document.getElementById('p-btn'),tName=document.getElementById('t-name'),plEl=document.getElementById('pl'),pCont=document.getElementById('p-cont'),tracks=typeof EXTERNAL_TRACKS!=='undefined'?EXTERNAL_TRACKS:[];
        let cIdx=0,cards=[];
        
        // Create floating particles
        function createParticles(){
            const container=document.getElementById('particles');
            for(let i=0;i<35;i++){
                const particle=document.createElement('div');
                particle.className='particle';
                particle.style.left=Math.random()*100+'%';
                particle.style.top=Math.random()*100+'%';
                particle.style.animationDelay=Math.random()*25+'s';
                particle.style.animationDuration=(20+Math.random()*10)+'s';
                container.appendChild(particle);
            }
        }
        
        function initP(){
            if(!tracks.length)return;plEl.innerHTML=tracks.map((t,i)=>`<div class="s-item ${i===cIdx?'active':''}" onclick="loadT(${i})"><span class="idx">${String(i+1).padStart(2,'0')}</span><span> ${t.replace('.mp3','').replace(/_/g,' ')}</span></div>`).join('');
            loadT(cIdx,false);
        }
        function loadT(idx,a=true){
            cIdx=idx;audio.src=`music/${tracks[idx]}`;tName.innerText=tracks[idx].replace('.mp3','').replace(/_/g,' ');
            document.querySelectorAll('.s-item').forEach((it,i)=>it.classList.toggle('active',i===idx));
            if(a)audio.play().then(()=>updUI(true));else updUI(false);
        }
        function toggleP(){if(audio.paused)audio.play().then(()=>updUI(true));else{audio.pause();updUI(false)}}
        function updUI(p){pCont.classList.toggle('paused',!p);pBtn.innerText=p?"PAUSE":"PLAY"}
        function nextT(){cIdx=(cIdx+1)%tracks.length;loadT(cIdx)}
        function prevT(){cIdx=(cIdx-1+tracks.length)%tracks.length;loadT(cIdx)}
        function stopT(){audio.pause();audio.currentTime=0;updUI(false)}
        audio.onended=nextT;
        let isDrag=false,sX,sY,iX,iY;
        const sD=(e)=>{
            if(e.target.closest('button')||e.target.closest('.s-list'))return;
            isDrag=true;const cX=e.type==='touchstart'?e.touches[0].clientX:e.clientX,cY=e.type==='touchstart'?e.touches[0].clientY:e.clientY;
            const r=pCont.getBoundingClientRect();sX=cX;sY=cY;iX=r.left;iY=r.top;
        };
        const oD=(e)=>{
            if(!isDrag)return;const cX=e.type==='touchmove'?e.touches[0].clientX:e.clientX,cY=e.type==='touchmove'?e.touches[0].clientY:e.clientY;
            pCont.style.left=`${iX+(cX-sX)}px`;pCont.style.top=`${iY+(cY-sY)}px`;pCont.style.right='auto';pCont.style.bottom='auto';
        };
        pCont.addEventListener('mousedown',sD);pCont.addEventListener('touchstart',sD,{passive:false});
        window.addEventListener('mousemove',oD);window.addEventListener('touchmove',oD,{passive:false});
        window.addEventListener('mouseup',()=>isDrag=false);window.addEventListener('touchend',()=>isDrag=false);
        const scene=document.getElementById('sphere-scene'),scroller=document.getElementById('main-scroller'),modal=document.getElementById('modal'),mImg=document.getElementById('m-img');
        new Granim({element:'#canvas-bg',direction:'top-bottom',states:{"default-state":{gradients:[['#050507','#1a0f2e'],['#0f172a','#050507']],transitionSpeed:8000}}});
        async function loadG(){
            try{
                const res=await fetch('images/photos.json'),data=await res.json(),photos=data.old||[];
                const count=photos.length,radius=window.innerWidth<768?250:450;
                photos.forEach((f,i)=>{
                    const src=`images/old/${f}`,img=document.createElement('img');
                    img.src=src;img.className='photo-card';
                    const phi=Math.acos(-1+(2*i)/count),theta=Math.sqrt(count*Math.PI)*phi;
                    const x=radius*Math.sin(phi)*Math.cos(theta),y=radius*Math.sin(phi)*Math.sin(theta),z=radius*Math.cos(phi);
                    const tf=`translate3d(${x}px,${y}px,${z}px) rotateY(${theta}rad) rotateX(${phi-Math.PI/2}rad)`;
                    img.style.transform=tf;img.dataset.sphereTransform=tf;
                    img.onclick=(e)=>{e.stopPropagation();openM(src);if(audio.paused)toggleP()};
                    scene.appendChild(img);cards.push(img);
                });
            }catch(e){}
        }
        function openM(s){mImg.src=s;modal.style.display='flex'}
        function closeM(){modal.style.display='none'}
        document.getElementById('heart-btn').onclick=()=>{
            const g=document.body.classList.toggle('grid-mode');
            cards.forEach(c=>c.style.transform=g?'none':c.dataset.sphereTransform);
            scroller.scrollTop=0;if(audio.paused)toggleP();
        };
        document.getElementById('ai-rank-btn').onclick=()=>{
            if(audio.paused)toggleP();
            const ov=document.getElementById('proc-ov'),bar=document.getElementById('p-bar');
            ov.style.display='flex';bar.style.width='0%';
            setTimeout(()=>bar.style.width='100%',100);
            setTimeout(()=>{ov.style.display='none';openM(cards[Math.floor(Math.random()*cards.length)].src)},2000);
        };
        window.onload=()=>{createParticles();loadG();initP()};
    </script>
</body>
</html>
