<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <title>2026 Future Hub</title>
    <script src="music/music_list.js"></script>
    <style>
        :root{--accent:#00ffa3;--glass:rgba(15,23,42,0.8);--heart-red:#ff4d6d;--purple:#a78bfa;--blue:#3b82f6}
        *{margin:0;padding:0;box-sizing:border-box}
        body{margin:0;background:#020205;color:white;font-family:'Inter',sans-serif;overflow:hidden;height:100dvh;position:relative}
        
        /* Animated gradient background */
        body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(167,139,250,0.15) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(0,255,163,0.15) 0%,transparent 50%),radial-gradient(circle at 40% 20%,rgba(59,130,246,0.1) 0%,transparent 50%);animation:bgShift 20s ease infinite;z-index:0}
        @keyframes bgShift{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(1.1)}}
        
        /* Floating particles */
        .particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1}
        .particle{position:absolute;width:4px;height:4px;background:var(--accent);border-radius:50%;opacity:0.3;animation:float 15s infinite}
        @keyframes float{0%,100%{transform:translateY(0) translateX(0);opacity:0}10%{opacity:0.3}90%{opacity:0.3}100%{transform:translateY(-100vh) translateX(50px);opacity:0}}
        
        .heart-container{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);display:flex;gap:60px;z-index:100;perspective:2000px;width:100%;justify-content:center;align-items:center}
        
        @media(max-width:768px){
            .heart-container{flex-direction:column;gap:30px;top:40%}
            .heart-visual{width:200px!important;height:200px!important}
            .main-title h1{font-size:3rem!important}
            .heart-link::before{width:240px!important;height:240px!important}
        }
        
        .heart-link{position:relative;text-align:center;text-decoration:none;transition:.6s cubic-bezier(.23,1,.32,1);transform-style:preserve-3d;filter:drop-shadow(0 10px 30px rgba(0,0,0,0.5))}
        
        /* 3D Glow ring effect */
        .heart-link::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(-20px);width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,transparent 40%,currentColor 40%,currentColor 42%,transparent 42%);opacity:0.3;animation:pulse 3s ease-in-out infinite;pointer-events:none}
        
        @keyframes pulse{0%,100%{transform:translate(-50%,-50%) translateZ(-20px) scale(1);opacity:0.3}50%{transform:translate(-50%,-50%) translateZ(-20px) scale(1.1);opacity:0.5}}
        
        .heart-link:hover{transform:translateY(-15px) rotateX(10deg) scale(1.05);filter:drop-shadow(0 20px 50px rgba(0,255,163,0.6))}
        .heart-link:hover .heart-visual{filter:brightness(1.2) saturate(1.3);transform:translateZ(80px) rotateZ(-5deg)}
        .heart-link:hover::before{animation:pulse 1.5s ease-in-out infinite}
        
        /* Holographic effect overlay */
        .heart-link::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,0.1) 50%,transparent 70%);opacity:0;transition:0.5s;pointer-events:none;animation:shine 8s infinite;z-index:10}
        @keyframes shine{0%,100%{transform:translateX(-100%);opacity:0}50%{transform:translateX(100%);opacity:0.3}}
        
        .heart-visual{position:relative;width:260px;height:260px;margin-bottom:15px;background-size:cover;background-position:center;-webkit-mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');mask-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');-webkit-mask-size:contain;mask-size:contain;-webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;transition:.6s cubic-bezier(.23,1,.32,1);transform:translateZ(50px);filter:brightness(0.9);border-radius:20px}
        
        .heart-old{background-image:url('images/old/image-035.png');color:var(--heart-red)}
        .heart-new{background-image:url('images/2026-02/image-018.jpg');color:var(--accent)}
        
        .heart-label{font-size:12px;font-weight:900;letter-spacing:3px;text-transform:uppercase;position:relative;padding:8px 20px;background:rgba(255,255,255,0.05);border-radius:20px;backdrop-filter:blur(10px);border:1px solid currentColor;transition:0.4s;transform:translateZ(30px)}
        .heart-link:hover .heart-label{transform:translateZ(60px);box-shadow:0 10px 30px currentColor}
        
        .main-title{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10;width:100%}
        .main-title h1{font-size:6rem;margin:0;letter-spacing:-2px;background:linear-gradient(135deg,rgba(0,255,163,0.1),rgba(167,139,250,0.1),rgba(59,130,246,0.1));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 80px rgba(0,255,163,0.3);white-space:nowrap;animation:titleGlow 4s ease-in-out infinite}
        @keyframes titleGlow{0%,100%{opacity:0.06;filter:blur(2px)}50%{opacity:0.12;filter:blur(0px)}}
        
        /* Enhanced music player with 3D depth */
        #p-cont{position:fixed;bottom:140px;right:20px;width:280px;background:linear-gradient(135deg,rgba(15,23,42,0.95),rgba(30,41,59,0.9));backdrop-filter:blur(30px);border:1px solid rgba(0,255,163,0.3);border-radius:28px;z-index:10000;padding:20px;box-shadow:0 25px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(0,255,163,0.1) inset,0 10px 40px rgba(0,255,163,0.2);touch-action:none;cursor:grab;transform:translateZ(0);transition:transform 0.3s,box-shadow 0.3s}
        #p-cont:hover{transform:translateY(-5px) translateZ(20px);box-shadow:0 30px 80px rgba(0,0,0,0.8),0 0 0 1px rgba(0,255,163,0.2) inset,0 15px 60px rgba(0,255,163,0.4)}
        #p-cont::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent,rgba(0,255,163,0.2),transparent);animation:rotate 8s linear infinite;pointer-events:none;opacity:0.3}
        @keyframes rotate{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        
        .p-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;pointer-events:none;position:relative;z-index:1}
        
        .eq{display:flex;align-items:flex-end;gap:2px;height:14px;padding:4px;background:rgba(0,255,163,0.1);border-radius:8px}
        .eq span{width:3px;background:linear-gradient(to top,var(--accent),var(--purple));border-radius:2px;animation:eq .8s infinite alternate;box-shadow:0 0 10px var(--accent)}
        .eq span:nth-child(2){animation-delay:.1s}
        .eq span:nth-child(3){animation-delay:.2s}
        @keyframes eq{0%{height:4px}100%{height:14px}}
        .paused .eq span{animation-play-state:paused;height:4px}
        
        #t-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;color:var(--accent);text-shadow:0 0 10px rgba(0,255,163,0.5)}
        
        .ctrls{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;position:relative;z-index:1}
        .ctrls button{background:linear-gradient(135deg,rgba(0,255,163,0.15),rgba(59,130,246,0.15));border:1px solid rgba(255,255,255,.15);color:white;height:38px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;transition:0.3s;position:relative;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
        .ctrls button::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;background:radial-gradient(circle,rgba(0,255,163,0.4),transparent);border-radius:50%;transition:0.5s;transform:translate(-50%,-50%)}
        .ctrls button:hover{background:linear-gradient(135deg,rgba(0,255,163,0.3),rgba(59,130,246,0.3));border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,163,0.4)}
        .ctrls button:hover::before{width:200px;height:200px}
        .ctrls button:active{transform:translateY(0)}
        
        .s-list{max-height:90px;overflow-y:auto;font-size:10px;background:rgba(0,0,0,.3);border-radius:12px;padding:6px;position:relative;z-index:1;border:1px solid rgba(255,255,255,0.05)}
        .s-list::-webkit-scrollbar{width:4px}
        .s-list::-webkit-scrollbar-track{background:rgba(0,0,0,0.2);border-radius:4px}
        .s-list::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--accent),var(--purple));border-radius:4px}
        
        .s-item{padding:8px;cursor:pointer;opacity:.6;border-radius:8px;transition:0.3s;position:relative;overflow:hidden}
        .s-item::before{content:'';position:absolute;left:0;top:50%;width:3px;height:0;background:linear-gradient(to bottom,var(--accent),var(--purple));transition:0.3s;transform:translateY(-50%)}
        .s-item:hover{opacity:.8;background:rgba(255,255,255,.05);padding-left:12px}
        .s-item:hover::before{height:60%}
        .s-item.active{opacity:1;background:linear-gradient(90deg,rgba(0,255,163,.25),rgba(0,255,163,.1));color:var(--accent);font-weight:600;box-shadow:0 0 20px rgba(0,255,163,0.3);padding-left:12px}
        .s-item.active::before{height:80%;box-shadow:0 0 10px var(--accent)}
        
        /* Enhanced bottom shelf with 3D depth */
        .bottom-shelf{position:fixed;bottom:0;width:100%;height:100px;background:linear-gradient(to top,rgba(0,255,163,.08),transparent);overflow:hidden;border-top:1px solid rgba(0,255,163,.2);z-index:50;box-shadow:0 -10px 40px rgba(0,0,0,0.3)}
        .bottom-shelf::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.1) 50%,transparent);animation:shimmer 3s infinite}
        @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
        
        .gif-track{display:flex;width:max-content;animation:slide 30s linear infinite;align-items:center;height:100%;position:relative;z-index:1}
        .gif-track img{height:60px;margin:0 10px;border-radius:12px;opacity:.5;transition:0.4s;box-shadow:0 5px 20px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);transform:perspective(500px) rotateY(0deg)}
        .gif-track img:hover{opacity:1;transform:perspective(500px) rotateY(-10deg) scale(1.15);box-shadow:0 10px 40px rgba(0,255,163,0.5);border-color:var(--accent)}
        
        @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
        
        /* Loading screen effect */
        @keyframes fadeIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
        .heart-container{animation:fadeIn 1s ease-out}
        #p-cont{animation:fadeIn 1.2s ease-out 0.3s both}
    </style>
</head>
<body>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    
    <div class="main-title"><h1>FUTURE HUB</h1></div>
    <div class="heart-container">
        <a href="old.html" class="heart-link"><div class="heart-visual heart-old"></div><div class="heart-label" style="color:var(--heart-red)">OLD MEMORIES</div></a>
        <a href="2026-02.html" class="heart-link"><div class="heart-visual heart-new"></div><div class="heart-label" style="color:var(--accent)">2026 FEBRUARY</div></a>
    </div>
    <div class="bottom-shelf"><div class="gif-track" id="gif-container"></div></div>
    <div id="p-cont" class="paused">
        <div class="p-header"><div class="eq"><span></span><span></span><span></span></div><div id="t-name">READY</div></div>
        <div class="ctrls"><button onclick="prevT()">◁◁</button><button id="p-btn" onclick="toggleP()">PLAY</button><button onclick="nextT()">▷▷</button></div>
        <div class="s-list" id="pl"></div>
        <audio id="audio"></audio>
    </div>
    <script>
        const audio=document.getElementById('audio'),pBtn=document.getElementById('p-btn'),tName=document.getElementById('t-name'),plEl=document.getElementById('pl'),pCont=document.getElementById('p-cont'),tracks=typeof EXTERNAL_TRACKS!=='undefined'?EXTERNAL_TRACKS:[];
        let cIdx=0;
        
        // Create floating particles
        function createParticles(){
            const container=document.getElementById('particles');
            for(let i=0;i<30;i++){
                const particle=document.createElement('div');
                particle.className='particle';
                particle.style.left=Math.random()*100+'%';
                particle.style.animationDelay=Math.random()*15+'s';
                particle.style.animationDuration=(10+Math.random()*10)+'s';
                container.appendChild(particle);
            }
        }
        
        async function initGifs(){
            try{
                const res=await fetch('images/photos.json'),data=await res.json(),gifs=data.lisa_gifs||[],cont=document.getElementById('gif-container');
                [...gifs,...gifs].forEach(n=>{const img=document.createElement('img');img.src=`bg/lisa/${n}`;cont.appendChild(img)});
            }catch(e){}
        }
        function initP(){
            plEl.innerHTML=tracks.map((t,i)=>`<div class="s-item ${i===cIdx?'active':''}" onclick="loadT(${i})">${i+1}. ${t.replace('.mp3','')}</div>`).join('');
            loadT(0,false);
        }
        function loadT(idx,a=true){
            if(!tracks.length)return;cIdx=idx;audio.src=`music/${tracks[idx]}`;
            tName.innerText=tracks[idx].replace('.mp3','').replace(/_/g,' ');
            document.querySelectorAll('.s-item').forEach((it,i)=>it.classList.toggle('active',i===idx));
            if(a)audio.play().then(()=>updUI(true));else updUI(false);
        }
        function toggleP(){if(audio.paused)audio.play().then(()=>updUI(true));else{audio.pause();updUI(false)}}
        function updUI(p){pCont.classList.toggle('paused',!p);pBtn.innerText=p?"PAUSE":"PLAY"}
        function nextT(){cIdx=(cIdx+1)%tracks.length;loadT(cIdx)}
        function prevT(){cIdx=(cIdx-1+tracks.length)%tracks.length;loadT(cIdx)}
        audio.onended=nextT;
        let isDrag=false,sX,sY,iX,iY;
        const sD=(e)=>{
            if(e.target.closest('button')||e.target.closest('.s-list'))return;
            isDrag=true;const cX=e.type==='touchstart'?e.touches[0].clientX:e.clientX,cY=e.type==='touchstart'?e.touches[0].clientY:e.clientY;
            const r=pCont.getBoundingClientRect();sX=cX;sY=cY;iX=r.left;iY=r.top;
            pCont.style.cursor='grabbing';
        };
        const oD=(e)=>{
            if(!isDrag)return;const cX=e.type==='touchmove'?e.touches[0].clientX:e.clientX,cY=e.type==='touchmove'?e.touches[0].clientY:e.clientY;
            pCont.style.left=`${iX+(cX-sX)}px`;pCont.style.top=`${iY+(cY-sY)}px`;pCont.style.right='auto';pCont.style.bottom='auto';
        };
        const eD=()=>{isDrag=false;pCont.style.cursor='grab'};
        pCont.addEventListener('mousedown',sD);pCont.addEventListener('touchstart',sD,{passive:false});
        window.addEventListener('mousemove',oD);window.addEventListener('touchmove',oD,{passive:false});
        window.addEventListener('mouseup',eD);window.addEventListener('touchend',eD);
        window.onload=()=>{createParticles();initGifs();initP()};
    </script>
</body>
</html>
